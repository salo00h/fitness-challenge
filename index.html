<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>عرض برنامج التمارين</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">نظام التمارين</div>
    <nav>
      <a href="index.html">العرض</a>
      <a href="admin.html">الإعدادات</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>برنامج التمارين</h1>
      <p>النجاح يبدأ بخطوة، ابدأ التحدي الآن. 💪🔥</p>
    </section>

    <section class="progress-board">
      <div class="progress-card">
        <span>إنجاز الأسبوع</span>
        <strong id="weekPercent">0%</strong>
        <div class="bar"><div id="weekBar"></div></div>
      </div>
      <div class="progress-card">
        <span>إنجاز الشهر</span>
        <strong id="monthPercent">0%</strong>
        <div class="bar"><div id="monthBar"></div></div>
      </div>
      <div class="progress-card challenge">
        <span>إنجاز التحدي كامل</span>
        <strong id="challengePercent">0%</strong>
        <div class="bar"><div id="challengeBar"></div></div>
      </div>
    </section>

    <section class="week-nav">
      <button id="prevWeek">الأسبوع السابق</button>
      <strong id="weekTitle"></strong>
      <button id="nextWeek">الأسبوع التالي</button>
    </section>

    <section id="days" class="days"></section>
  </main>

  <script src="app.js"></script>
  <script>renderViewer();</script>
</body>

</html>
