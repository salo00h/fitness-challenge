<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>عرض برنامج التمارين</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="home-page">
  <header class="topbar">
    <div class="brand">نظام التمارين</div>
    <nav>
      <a href="index.html">العرض</a>
      <a href="stats.html">الإحصائيات</a>
      <a href="leaderboard.html">لوحة الترتيب</a>
      <a href="messages.html">الرسائل</a>
      <a href="achievements.html">الأوسمة</a>
      <a href="store.html">المتجر</a>
      <a href="hall.html">Hall of Fame</a>
      <a href="admin.html">الإعدادات</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>برنامج التمارين</h1>
      <p>النجاح يبدأ بخطوة، ابدأ التحدي الآن. 💪🔥</p>
    </section>

    <section class="home-tabs" aria-label="أقسام الصفحة الرئيسية">
      <button type="button" class="is-active" data-home-tab="today">لوحة اليوم</button>
      <button type="button" data-home-tab="challenges">التحديات</button>
      <button type="button" data-home-tab="activity">النشاط</button>
    </section>

    <section id="dashboardTabToday" class="home-tab-panel is-active" data-home-panel="today">
      <div id="dashboardUserSlot"></div>

      <section id="dailyQuote" class="daily-quote"></section>

      <section class="quick-actions" aria-label="أزرار سريعة">
        <button type="button" data-home-tab="challenges">دخول التحديات</button>
        <a href="stats.html">الإحصائيات</a>
        <a href="leaderboard.html">الترتيب</a>
        <a href="messages.html">الرسائل</a>
      </section>

      <section id="todayMission" class="today-mission"></section>
    </section>

    <section id="dashboardTabChallenges" class="home-tab-panel" data-home-panel="challenges">
      <div class="section-title home-section-title">
        <h2>التحديات</h2>
        <span>اختاري تحديًا لفتح الأسابيع والأيام</span>
      </div>
      <section id="days" class="days"></section>
    </section>

    <section id="dashboardTabActivity" class="home-tab-panel" data-home-panel="activity">
      <section id="activityFeed" class="activity-feed"></section>
      <section id="homeCompetitionMini" class="home-competition-mini"></section>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
